<div class="contacts-page">
  <div class="page-header">
    <h2>Contacts</h2>
    <button class="btn btn-primary" (click)="openAdd()">+ Add Contact</button>
  </div>

  <!-- Tag filters -->
  <div class="tag-filters" *ngIf="(tags$ | async)?.length">
    <span class="filter-label">Filter by tag:</span>
    <button
      *ngFor="let tag of tags$ | async"
      class="tag-chip"
      [class.active]="isFilterActive(tag)"
      (click)="toggleFilterTag(tag)">
      {{ tag }}
    </button>
    <button class="btn btn-sm" *ngIf="selectedTags().length" (click)="selectedTags.set([])">Clear</button>
  </div>

  <!-- Contact table -->
  <table class="contacts-table" *ngIf="filteredContacts().length; else empty">
    <thead>
      <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Email</th>
        <th>Tags</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let c of filteredContacts()">
        <td>{{ c.name }}</td>
        <td>{{ c.phone }}</td>
        <td>{{ c.email || '—' }}</td>
        <td>
          <span class="tag-chip" *ngFor="let t of c.tags">{{ t }}</span>
        </td>
        <td class="actions">
          <button class="btn btn-sm" (click)="openEdit(c)">Edit</button>
          <button class="btn btn-sm btn-danger" (click)="delete(c.id)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

  <ng-template #empty>
    <p class="empty-state">No contacts yet. Click <strong>+ Add Contact</strong> to get started.</p>
  </ng-template>

  <!-- Add / Edit form modal -->
  <div class="modal-overlay" *ngIf="showForm()" (click)="showForm.set(false)">
    <div class="modal" (click)="$event.stopPropagation()">
      <h3>{{ editingContact() ? 'Edit Contact' : 'New Contact' }}</h3>
      <form (ngSubmit)="save()">
        <label>Name *
          <input type="text" [(ngModel)]="form.name" name="name" required />
        </label>
        <label>Phone * <small>(E.164, e.g. +5491112345678)</small>
          <input type="tel" [(ngModel)]="form.phone" name="phone" required />
        </label>
        <label>Email
          <input type="email" [(ngModel)]="form.email" name="email" />
        </label>
        <label>Tags
          <div class="tag-input-row">
            <input type="text" [(ngModel)]="tagInput" name="tagInput"
              placeholder="Add tag and press Enter"
              (keydown.enter)="$event.preventDefault(); addTag()" />
            <button type="button" class="btn btn-sm" (click)="addTag()">Add</button>
          </div>
          <div class="tag-list">
            <span class="tag-chip removable" *ngFor="let t of form.tags">
              {{ t }}
              <button type="button" (click)="removeTag(t)">×</button>
            </span>
          </div>
        </label>
        <div class="form-actions">
          <button type="button" class="btn" (click)="showForm.set(false)">Cancel</button>
          <button type="submit" class="btn btn-primary" [disabled]="!form.name || !form.phone">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>
